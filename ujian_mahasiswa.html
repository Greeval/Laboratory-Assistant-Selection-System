<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Online - Rekrutmen Aslab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .exam-header { background-color: #212529; color: white; padding: 15px; }
        .question-box { background-color: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 25px; }
        .number-nav button { width: 40px; height: 40px; margin: 4px; }
    </style>
</head>
<body>

<div class="exam-header d-flex justify-content-between align-items-center px-4">
    <h5 class="mb-0">Ujian Seleksi Asisten Laboratorium</h5>
    <div class="bg-danger px-3 py-2 rounded fw-bold">Sisa Waktu: 58:42</div>
</div>

<div class="container my-4">
    <div class="row g-4">
        <!-- Soal Section -->
        <div class="col-lg-8">
            <div class="question-box">
                <span class="badge bg-secondary mb-3">Soal Nomor 1</span>
                <p class="fs-5 fw-semibold mb-4">Manakah di bawah ini yang merupakan konsep utama dari Object-Oriented Programming (OOP)?</p>
                
                <div class="d-flex flex-column gap-3">
                    <label class="btn btn-outline-secondary text-start p-3">
                        <input type="radio" name="soal1" value="A" class="me-2"> A. Inheritance, Encapsulation, Polymorphism
                    </label>
                    <label class="btn btn-outline-secondary text-start p-3">
                        <input type="radio" name="soal1" value="B" class="me-2"> B. Sequential, Iteration, Selection
                    </label>
                    <label class="btn btn-outline-secondary text-start p-3">
                        <input type="radio" name="soal1" value="C" class="me-2"> C. HTML, CSS, JavaScript
                    </label>
                    <label class="btn btn-outline-secondary text-start p-3">
                        <input type="radio" name="soal1" value="D" class="me-2"> D. Normalization, Indexing, Querying
                    </label>
                </div>

                <div class="d-flex justify-content-between mt-5">
                    <button class="btn btn-secondary disabled px-4">Sebelumnya</button>
                    <button class="btn btn-primary px-4">Selanjutnya</button>
                </div>
            </div>
        </div>

        <!-- Navigasi Nomor Section -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4">
                <h6 class="fw-bold mb-3">Navigasi Soal</h6>
                <div class="number-nav mb-4">
                    <button class="btn btn-success fw-bold">1</button>
                    <button class="btn btn-outline-secondary fw-bold">2</button>
                    <button class="btn btn-outline-secondary fw-bold">3</button>
                    <button class="btn btn-outline-secondary fw-bold">4</button>
                    <button class="btn btn-outline-secondary fw-bold">5</button>
                    <button class="btn btn-outline-secondary fw-bold">6</button>
                    <button class="btn btn-outline-secondary fw-bold">7</button>
                    <button class="btn btn-outline-secondary fw-bold">8</button>
                    <button class="btn btn-outline-secondary fw-bold">9</button>
                    <button class="btn btn-outline-secondary fw-bold">10</button>
                </div>
                <hr>
                <a href="dashboard_mahasiswa.html" class="btn btn-danger w-100 py-2 fw-bold" onclick="return confirm('Apakah Anda yakin ingin menyelesaikan ujian?')">Selesaikan Ujian</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
